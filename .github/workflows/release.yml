name: Build & Release (Linux + Windows)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true          # ← tell checkout to fetch LFS files

      - name: Pull LFS files  # ← extra safety, sometimes needed
        run: git lfs pull
        
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish Linux (single file)
        run: |
          dotnet publish UltralightProducer/UltralightProducer.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            /p:PublishSingleFile=true \
            -o ./publish-linux

      - name: Make binary executable
        run: chmod +x ./publish-linux/UltralightProducer

      - name: Archive Linux
        run: |
          cd publish-linux
          tar -czvf UltralightProducer-linux-x64.tar.gz UltralightProducer runtimes
          mv UltralightProducer-linux-x64.tar.gz ../

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: UltralightProducer-linux-x64.tar.gz

      - name: Upload Unity Package
        uses: actions/upload-artifact@v4
        with:
          name: unity-package
          path: unitySample.unitypackage


  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish Windows (single file)
        run: |
          dotnet publish UltralightProducer/UltralightProducer.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            -o publish-windows

      - name: Archive Windows
        run: |
          cd publish-windows
          tar -a -c -f ../UltralightProducer-win-x64.zip UltralightProducer.exe runtimes

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: UltralightProducer-win-x64.zip


  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
  
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-build
  
      - uses: actions/download-artifact@v4
        with:
          name: windows-build
  
      - uses: actions/download-artifact@v4
        with:
          name: unity-package
  
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            UltralightProducer-linux-x64.tar.gz
            UltralightProducer-win-x64.zip
            unitySample.unitypackage
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true