name: Build & Release (Linux x64)

on:
  push:
    tags:
      - 'v*'   # Trigger on version tags like v1.0.0

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish (Self-contained, single file)
        run: |
          dotnet publish UltralightProducer/UltralightProducer.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            /p:PublishSingleFile=true \
            -o ./publish

      - name: Make binary executable
        run: chmod +x ./publish/UltralightProducer

      - name: Archive release
        run: |
          cd publish
          tar -czvf UltralightProducer-linux-x64.tar.gz UltralightProducer resources
          mv UltralightProducer-linux-x64.tar.gz ../

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: UltralightProducer-linux-x64.tar.gz
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}